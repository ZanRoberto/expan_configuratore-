<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPAN</title>
<style>
:root{--ink:#1A1F2B;--paper:#F5F4F0;--line:#DDDCD5;--petrol:#0E6B66;--petrol-soft:#E2EFEE;--amber:#E8A33D;--amber-soft:#FBEFD8;--grey:#6B7680;--red:#8A4444;--sans:'Segoe UI',system-ui,-apple-system,sans-serif;--mono:'SF Mono',ui-monospace,Consolas,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
header{background:var(--ink);color:#EDEFEA;padding:12px 18px;position:sticky;top:0;z-index:50}
header h1{font-size:18px;font-weight:700}header h1 .light{color:var(--amber)}
header .sub{font-family:var(--mono);font-size:10.5px;color:#9AA7B0;margin-top:2px}
.mondi{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center}
.mondi .lbl{font-family:var(--mono);font-size:10px;color:#7C8894;margin-right:2px}
.mondi button{font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid #3A424E;background:transparent;color:#9AA7B0;cursor:pointer}
.mondi button.on{background:var(--amber);color:var(--ink);border-color:var(--amber)}
.mondi button.def{border-style:dashed;color:#C79A4B}
.mondi button.lock{opacity:.5}
.admin{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #2A313C}
.admin .lbl{font-family:var(--mono);font-size:9.5px;color:#7C8894}
.admin .lbl.locked{color:#6E5A2A}
.admin .sep{width:1px;height:16px;background:#3A424E;margin:0 4px}
.admin button{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid #3A424E;background:transparent;color:#9AA7B0;cursor:pointer}
.admin button.on{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.admin button.gen{border-color:var(--amber);color:var(--amber)}
.mondi .solo{font-size:9px;padding:3px 7px;border-style:dashed}
main{max-width:1220px;margin:0 auto;padding:14px}
section{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:14px}
.sh{display:flex;align-items:center;gap:8px;padding:10px 13px;background:#FBFBF9;border-bottom:1px solid var(--line)}
.sh.acc{background:var(--petrol-soft)}
.sh .tag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--petrol)}
.sh h2{font-size:13.5px;font-weight:700}
.sb{padding:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:760px){.g2{grid-template-columns:1fr}}
.fld{margin-bottom:10px}
.fld label{display:block;font-family:var(--mono);font-size:10px;font-weight:700;color:#5A6570;margin-bottom:4px}
.fld input,.fld select{width:100%;height:36px;border:1px solid var(--line);border-radius:8px;padding:0 9px;font-size:14px;background:#fff;font-family:var(--sans)}
.btn{border:none;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--petrol);color:#fff}.btn-ghost{background:#fff;color:var(--petrol);border:1px solid var(--petrol)}
.btn-amber{background:var(--amber);color:var(--ink)}
.row-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.olines{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.oline{display:grid;grid-template-columns:44px 1fr 70px 90px 30px;gap:9px;align-items:center;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#FBFBF9;cursor:pointer}
.oline.active{border-color:var(--petrol);background:var(--petrol-soft)}
.oline .fam{font-family:var(--mono);font-size:9px;font-weight:700;text-align:center;padding:4px 0;border-radius:5px;background:var(--ink);color:#fff}
.oline .desc{font-size:13px}.oline .desc small{display:block;color:var(--grey);font-size:11px;font-family:var(--mono)}
.oline .qta input{width:100%;height:30px;border:1px solid var(--line);border-radius:6px;text-align:center}
.oline .prz{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.oline .del{width:26px;height:26px;border:none;background:none;color:var(--red);cursor:pointer;font-weight:700}
.editorwrap{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}@media(max-width:820px){.editorwrap{grid-template-columns:1fr}}
canvas#disegno{width:100%;height:280px;display:block;background:#FBFBFA;border:1px solid var(--line);border-radius:9px}
.toggle{display:flex;gap:6px;margin-bottom:8px}
.toggle button{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--line);background:#fff;color:var(--petrol);cursor:pointer}
.toggle button.on{background:var(--petrol);color:#fff}
.dash{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.k{background:#FBFBF9;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.k .l{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--grey)}
.k .v{font-size:16px;font-weight:700;margin-top:1px}
.k.big{grid-column:1/-1;background:var(--petrol-soft);border-color:var(--petrol)}.k.big .v{color:var(--petrol);font-size:22px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #EEE}
th{font-family:var(--mono);font-size:9px;color:var(--grey)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.distgrp{margin-bottom:12px}
.distgrp .gt{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--petrol);margin-bottom:4px}
.note{font-family:var(--mono);font-size:10px;color:var(--grey);margin-top:9px}
.seal .row{display:flex;align-items:center;gap:8px;padding:5px 0;font-family:var(--mono);font-size:12px}
.seal .prog{margin-top:9px;background:#FBFBF9;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--mono);font-size:11px;line-height:1.7}
.empty{font-family:var(--mono);font-size:12px;color:var(--grey);padding:10px}
.addpanel{position:fixed;top:0;right:0;height:100vh;width:300px;background:#fff;border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(0,0,0,.08);transform:translateX(320px);transition:transform .22s;z-index:80;overflow-y:auto;padding:0}
.addpanel.open{transform:translateX(0)}
.addpanel .aph{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.addpanel .aph button{border:none;background:none;font-size:16px;cursor:pointer;color:var(--grey)}
.addpanel .apg{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--grey);padding:12px 14px 4px}
.addpanel .apl{display:block;width:calc(100% - 20px);margin:4px 10px;text-align:left;border:1px solid var(--line);background:#FBFBF9;border-radius:8px;padding:10px 12px;font-size:13.5px;font-weight:600;cursor:pointer}
.addpanel .apl:hover{background:var(--petrol-soft);border-color:var(--petrol)}
.addpanel .apl.dxf{background:var(--amber-soft);border-color:var(--amber);font-weight:600;font-size:12.5px}
.offi{position:fixed;inset:0;background:rgba(20,25,35,.5);z-index:90;display:none;overflow-y:auto;padding:24px}
.offi.open{display:block}
.offic{max-width:820px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden}
.offi .oh{background:var(--ink);color:#EDEFEA;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.offi .oh h2{font-size:17px}.offi .oh .x{background:none;border:none;color:#9AA7B0;font-size:18px;cursor:pointer}
.offi .ob{padding:20px}
.offi .step{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--petrol);margin:0 0 10px}
.offi .banner{background:var(--amber-soft);border:1px solid var(--amber);color:#7A5410;font-size:12px;padding:8px 11px;border-radius:8px;margin-bottom:14px}
.offi .card{border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:12px}
.offi .card h3{font-size:12px;font-family:var(--mono);letter-spacing:.05em;color:var(--grey);margin-bottom:8px;text-transform:uppercase}
.offi .rule{display:flex;gap:7px;margin-bottom:7px}
.offi .rule input{flex:1;height:34px;border:1px solid var(--line);border-radius:7px;padding:0 9px;font-size:13px}
.offi .rule .parsed{font-family:var(--mono);font-size:9px;color:var(--petrol);align-self:center;white-space:nowrap}
.offi .rule .del{width:30px;border:1px solid var(--line);background:#fff;color:var(--red);border-radius:7px;cursor:pointer}
.offi .norm{font-size:12.5px;padding:7px 10px;border-radius:7px;background:var(--petrol-soft);margin-bottom:6px}
.offi .cf{display:flex;gap:7px;margin-bottom:6px;align-items:center}
.offi .cf input{flex:1;height:32px;border:1px solid var(--line);border-radius:7px;padding:0 8px;font-size:13px}
.offi .cf .del{width:28px;border:1px solid var(--line);background:#fff;color:var(--red);border-radius:6px;cursor:pointer}
.addov{position:fixed;inset:0;background:rgba(20,25,35,.25);z-index:79;opacity:0;pointer-events:none;transition:opacity .22s}
.addov.open{opacity:1;pointer-events:auto}
#printArea{display:none}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:22px}}
.p-doc{max-width:800px;margin:0 auto}.p-doc h2{font-size:20px;border-bottom:2px solid var(--ink);padding-bottom:6px}.p-doc .meta{font-family:var(--mono);font-size:11px;color:#555;margin:6px 0 14px}.p-doc .tot{font-size:16px;font-weight:700;text-align:right;margin-top:8px}.p-doc .disc{font-size:10px;color:#777;margin-top:18px;border-top:1px solid #ccc;padding-top:8px}
.cfhead{display:grid;grid-template-columns:1fr 1.5fr 62px 62px 30px;gap:8px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--grey);letter-spacing:.4px;padding:0 2px 4px}
.cf{display:grid !important;grid-template-columns:1fr 1.5fr 62px 62px 30px;gap:8px;align-items:start;margin-bottom:6px}
.cf>input,.cf>.nc{margin-top:0}
.cf>input[data-k="label"],.cf>input[data-k="min"],.cf>input[data-k="max"],.cf>.del{height:34px}
.atab th{text-align:left;padding:3px 6px 4px 0;color:#8A97A2;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.4px;border-bottom:1px solid var(--line)}
.atab td{padding:2px 6px 2px 0}
.atab input{width:100%;height:28px;border:1px solid transparent;border-radius:6px;padding:0 6px;font-family:var(--mono);font-size:11px;background:#FBFBFA;color:#16202B}
.atab input:hover{border-color:var(--line);background:#fff}
.atab input:focus{border-color:var(--petrol);background:#fff;outline:none}
.atab input.salvato{border-color:#2E8B57;background:#F2FAF6}
.arm{width:24px;height:26px;border:1px solid transparent;border-radius:6px;background:none;color:#C9CFD4;cursor:pointer;font-size:10px}
.arm:hover{border-color:#C0392B;color:#C0392B;background:#FDECEA}
.vsel{display:grid;grid-template-columns:1fr 30px;gap:4px;align-items:center}
.vsel select{width:100%;height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 8px;font-family:var(--mono);font-size:11.5px;color:#16202B}
.vsel .vdel{height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#94A0AA;cursor:pointer;font-size:11px}
.vsel .vdel:hover{border-color:#C0392B;color:#C0392B;background:#FDECEA}
.vsel input.vnew{width:100%;height:34px;border:1px solid var(--amber);border-radius:8px;background:#FFFDF6;padding:0 8px;font-family:var(--mono);font-size:11.5px}
.anal{margin-top:12px;border:1px solid #D7DEE3;border-radius:9px;background:#FAFBFC;overflow:hidden}
.anh{font-family:var(--mono);font-size:9px;font-weight:700;color:#8A97A2;letter-spacing:.5px;padding:6px 10px;background:#F1F4F6;border-bottom:1px solid #E4E9ED}
.ang{padding:6px 10px}
.ai{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px solid #F0F2F4}
.ai:last-child{border-bottom:none}
.ai span{color:#6B7680;font-family:var(--mono);font-size:10.5px}
.ai b{margin-left:auto;font-variant-numeric:tabular-nums;color:#16202B}
.ai i{font-style:normal;color:#8A97A2;font-size:10px;margin-left:3px}
.ai.mg{border-top:1px solid #D7DEE3;margin-top:2px;padding-top:5px}
.ai.mg b{color:#1E6B45;font-weight:700}
.ai.pv b{color:#8A6D1A}
.ai.nt b{color:var(--petrol);font-weight:700}
.rgrp{border:1px solid var(--line);border-radius:8px;background:#fff;margin-bottom:5px}
.rgrp>summary{list-style:none;cursor:pointer;height:34px;display:flex;align-items:center;gap:8px;padding:0 10px;font-family:var(--mono);font-size:11px;color:#3C4650;user-select:none}
.rgrp>summary::-webkit-details-marker{display:none}
.rgrp>summary b{color:var(--petrol);letter-spacing:.4px}
.rgrp>summary span{color:#8A97A2;margin-left:auto;font-size:10px}
.rgrp>summary:after{content:'▾';color:#94A0AA;font-size:10px}
.rgrp[open]>summary{border-bottom:1px solid #F0F1F2}
.rgrp[open]>summary:after{content:'▴'}
.rgrp:not([open])>.rgin{display:none !important}
.rgin{padding:7px 8px;background:#FCFCFB;border-radius:0 0 7px 7px}
.parsed.pz{background:#EAF6EF;color:#1E6B45;border-color:#CBE6D8}
.parsed.bl{background:#FDECEA;color:#922B21;border-color:#F0C4BE}
.parsed.av{background:#FFF8E8;color:#8A6D1A;border-color:#EBDCB4}
.valsD{border:1px solid var(--line);border-radius:8px;background:#fff}
.valsD>summary{list-style:none;cursor:pointer;height:32px;display:flex;align-items:center;gap:6px;padding:0 9px;font-family:var(--mono);font-size:11px;color:#3C4650;user-select:none}
.valsD>summary::-webkit-details-marker{display:none}
.valsD>summary:after{content:'▾';margin-left:auto;color:#94A0AA;font-size:10px}
.valsD[open]>summary:after{content:'▴'}
.valsD[open]>summary{border-bottom:1px solid #F0F1F2;color:var(--petrol);font-weight:700}
.valsD>summary b{font-weight:700;color:var(--petrol)}
.valsD>summary span{color:#8A97A2;margin-left:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.valsD:not([open])>.vals{display:none !important}
.valsD[open]>.vals{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:6px;background:#FCFCFB;border-radius:0 0 7px 7px}
.vals{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:6px;background:#FCFCFB;border-radius:0 0 7px 7px}
.sw8{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:inline-block;flex:none}
.chip{display:inline-flex;align-items:center;gap:5px;background:#EDF3F2;border:1px solid #D5E2DF;border-radius:13px;padding:2px 5px 2px 9px;font-family:var(--mono);font-size:11px;color:#16202B;line-height:18px}
.chip i{cursor:pointer;color:#94A0AA;font-style:normal;font-weight:700}
.chip i:hover{color:#C0392B}
.addval{border:1px dashed #C8D2D8;background:#fff;color:var(--petrol);font-weight:700;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:13px;font-family:var(--mono)}
.addval:hover{border-color:var(--petrol);background:#F3F8F7}
.valin{border:1px solid var(--amber);border-radius:13px;height:22px;width:104px;font-size:11px;padding:0 8px;font-family:var(--mono);background:#FFFDF6}
.cf .nc{text-align:center;color:#C9CFD4;font-size:11px}
.cf select{height:32px;border:1px solid var(--line);border-radius:7px;background:#fff;font-family:var(--mono);font-size:11px;padding:0 4px}
.cf .nc{text-align:center;color:#C9CFD4;font-size:11px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:6px}
@media(max-width:820px){.fgrid{grid-template-columns:1fr}}
.fgrid .fcell label{display:block;font-family:var(--mono);font-size:9.5px;font-weight:700;color:#7C8894;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;line-height:1.25}
.fgrid .fcell select,.fgrid .fcell input{width:100%;height:34px;border:1px solid var(--line);border-radius:8px;padding:0 9px;font-size:14px;background:#fff;font-family:var(--sans)}
.fgrid .fcell input.nuova{border-color:var(--amber);background:#FFFDF6}
</style>

<header>
  <h1 id="brand">EXPAN</h1>
  <div class="sub" id="hsub"></div>
  <div class="admin" id="admin"></div>
  <div class="mondi" id="mondi"></div>
</header>
<main>
  <section>
    <div class="sh acc"><span class="tag" id="tagOrd"></span><h2 id="ordTitolo"></h2>
      <span id="ordStato" style="margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px"></span>
      <button id="btnOrdini" class="btn btn-ghost" style="margin-left:8px">Ordini</button>
      <button id="btnRegistra" class="btn" style="margin-left:6px">Registra ordine</button>
    </div>
    <div class="sb">
      <div class="g2">
        <div class="fld"><label id="lNum"></label><input id="ordNum" readonly></div>
        <div class="fld"><label id="lData"></label><input id="ordData" readonly></div>
      </div>
      <div class="fld"><label id="lCli"></label><select id="ordCliente"></select></div>
    </div>
  </section>

  <section>
    <div class="sh"><span class="tag">01</span><h2 id="tProdotti"></h2></div>
    <div class="sb">
      <div class="olines" id="olines"></div>
      <div class="row-btns" id="nuovi"></div>
      <input type="file" id="fileDXF" accept=".dxf" hidden>
      <input type="file" id="fileGLB" accept=".glb,.gltf" hidden>
      <input type="file" id="fileTMP" accept=".csv,.txt,.tsv" hidden>
      <input type="file" id="fileANAG" accept=".csv,.txt,.tsv" hidden>
      <div id="editorMount" style="margin-top:12px"></div>
    </div>
  </section>

  <section>
    <div class="sh"><span class="tag">02</span><h2 id="tDistinta"></h2></div>
    <div class="sb">
      <div id="distinta"></div>
      <div class="row-btns"><button class="btn btn-primary" id="btnOfferta"></button></div>
    </div>
  </section>

  <section>
    <div class="sh"><span class="tag">03</span><h2 id="tCicli"></h2></div>
    <div class="sb"><div id="cicli"></div></div>
  </section>

  <section>
    <div class="sh"><span class="tag">04</span><h2 id="tQR"></h2></div>
    <div class="sb"><div id="schedeQR" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px"></div></div>

  <section>
    <div class="sh"><span class="tag">SIGILLO</span><h2 id="tSigillo"></h2></div>

  </section>
</main>

<div id="addOv" class="addov"></div>
<div id="addPanel" class="addpanel"></div>

<script>
function parseDXF(text){
  const lines = text.split(/\r\n|\r|\n/);
  const pairs = [];
  for(let i=0;i+1<lines.length;i+=2){
    pairs.push([lines[i].trim(), lines[i+1]]);
  }
  const ents = []; let cur=null;
  const flush = ()=>{ if(cur) ents.push(cur); cur=null; };
  for(let i=0;i<pairs.length;i++){
    const [code,val]=pairs[i];
    if(code==='0'){
      const t=(val||'').trim().toUpperCase();
      if(t==='VERTEX'){
        /* i 10/20 che seguono sono i vertici della POLYLINE corrente: NON chiudere */
      } else if(t==='SEQEND'){
        flush();
      } else if(['LWPOLYLINE','POLYLINE','LINE','CIRCLE','ARC','SPLINE','TEXT','MTEXT'].includes(t)){
        flush(); cur={type:t,xs:[],ys:[],closed:false,r:null,txt:'',layer:''};
      } else { flush(); }
    } else if(cur){
      if(code==='10'||code==='11') cur.xs.push(parseFloat(val));
      else if(code==='20'||code==='21') cur.ys.push(parseFloat(val));
      else if(code==='40'&&cur.type==='CIRCLE') cur.r=parseFloat(val);
      else if(code==='70'&&cur.xs.length===0&&(cur.type==='LWPOLYLINE'||cur.type==='POLYLINE')) cur.closed=(parseInt(val)&1)===1;
      else if((code==='1'||code==='3')&&(cur.type==='TEXT'||cur.type==='MTEXT')) cur.txt+=val;
      else if(code==='8') cur.layer=(val||'').trim();
    }
  }
  flush();

  // ── annotazioni testuali (il CAD che DICHIARA il modello) ──────────────
  const rawTesti = ents.filter(e=>(e.type==='TEXT'||e.type==='MTEXT')&&e.txt&&e.txt.trim())
    .map(e=>({s:e.txt.replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'').trim(),
              x:e.xs[0]||0, y:e.ys[0]||0}));
  const testi = rawTesti.map(t=>t.s).filter(Boolean);
  // separa quote (label:numero) da variabili (etichette) e header
  const HEADER=/^(quote|variabili|legenda|note)\b/i;
  const quote=[], variabili=[];
  testi.forEach(s=>{
    if(HEADER.test(s)) return;
    const m=s.match(/^(.+?)\s*[:=]\s*([+\-]?\d[\d\.,\-\s]*)\s*(mm|cm|m)?/i);
    if(m){ quote.push({label:m[1].trim(), val:m[2].replace(/\s/g,''), unita:m[3]||'mm'}); }
    else if(s.length<=28 && !/[.]{2,}/.test(s)){ variabili.push(s.split('/')[0].trim()); }
  });
  const dichiarazione = {quote, variabili, testi};

  const clean = ents.filter(e=>e.xs.length||e.r!=null);
  clean.forEach(e=>{ e.xs=e.xs.filter(v=>!isNaN(v)); e.ys=e.ys.filter(v=>!isNaN(v)); });

  // bounding box globale
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  clean.forEach(e=>{
    e.xs.forEach(x=>{minX=Math.min(minX,x);maxX=Math.max(maxX,x)});
    e.ys.forEach(y=>{minY=Math.min(minY,y);maxY=Math.max(maxY,y)});
    if(e.r!=null&&e.xs.length){const cx=e.xs[0],cy=e.ys[0];
      minX=Math.min(minX,cx-e.r);maxX=Math.max(maxX,cx+e.r);
      minY=Math.min(minY,cy-e.r);maxY=Math.max(maxY,cy+e.r);}
  });
  const W=isFinite(maxX-minX)?Math.round(maxX-minX):0;
  const H=isFinite(maxY-minY)?Math.round(maxY-minY):0;

  // polilinee chiuse -> centroide + dimensione
  const closed = clean.filter(e=>(e.type==='LWPOLYLINE'&&e.closed)||(e.type==='POLYLINE'));
  const boxes = closed.map(e=>{
    const bx=Math.round(Math.max(...e.xs)-Math.min(...e.xs));
    const by=Math.round(Math.max(...e.ys)-Math.min(...e.ys));
    const cx=(Math.max(...e.xs)+Math.min(...e.xs))/2;
    const cy=(Math.max(...e.ys)+Math.min(...e.ys))/2;
    return {bx,by,cx,cy};
  });
  // il contorno = box più grande; gli altri = candidati vani/moduli
  boxes.sort((a,b)=>(b.bx*b.by)-(a.bx*a.by));
  const inner = boxes.slice(1);
  // raggruppa per dimensione simile (arrotondata a 10)
  const groups={};
  inner.forEach(b=>{const k=Math.round(b.bx/10)*10+'x'+Math.round(b.by/10)*10;(groups[k]=groups[k]||[]).push(b)});
  let bigGroup=null,bigKey=null;
  for(const k in groups){if(!bigGroup||groups[k].length>bigGroup.length){bigGroup=groups[k];bigKey=k}}
  // stima griglia cols x rows dal cluster
  let grid=null;
  if(bigGroup&&bigGroup.length>=2){
    const clust=(vals)=>{vals=vals.slice().sort((a,b)=>a-b);let n=1;for(let i=1;i<vals.length;i++)if(vals[i]-vals[i-1]>15)n++;return n;};
    const cols=clust(bigGroup.map(b=>b.cx));
    const rows=clust(bigGroup.map(b=>b.cy));
    grid={cols,rows,count:bigGroup.length,size:bigKey};
  }
  const circles = clean.filter(e=>e.type==='CIRCLE');
  const holeR = circles.length?Math.round(circles.reduce((s,c)=>s+c.r,0)/circles.length):null;

  // geometria disegnabile: polilinee (con punti) + cerchi + bounds
  const polys = clean.filter(e=>e.xs.length>=2 && (e.type==='LWPOLYLINE'||e.type==='POLYLINE'||e.type==='LINE'))
    .map(e=>{
      const pts=e.xs.map((x,i)=>[x, e.ys[i]!=null?e.ys[i]:0]);
      const area=(Math.max(...e.xs)-Math.min(...e.xs))*(Math.max(...e.ys)-Math.min(...e.ys));
      return {pts, closed:e.closed||e.type==='POLYLINE', area, layer:e.layer||''};
    });
  const circ2 = circles.filter(c=>c.xs.length).map(c=>({cx:c.xs[0],cy:c.ys[0],r:c.r,layer:c.layer||''}));
  const geom = {
    bounds:{minX:isFinite(minX)?minX:0,minY:isFinite(minY)?minY:0,
            maxX:isFinite(maxX)?maxX:0,maxY:isFinite(maxY)?maxY:0},
    polys, circles:circ2
  };

  return {
    W,H,
    entita:clean.length,
    chiuse:closed.length,
    linee:clean.filter(e=>e.type==='LINE').length,
    cerchi:circles.length,
    holeR,
    grid,
    ripetute: bigGroup?bigGroup.length:0,
    dimRip: bigKey,
    geom,
    dichiarazione
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   MOTORE DI DISEGNO — parametrico, quotato, scomponibile, a colori
   Tre viste per gli archetipi: strati · moduli · profilo
   Nessun 3D esterno: proiezione obliqua 2.5D, un solo file.
   ═══════════════════════════════════════════════════════════════════════ */
const PAL=['#0E6B66','#E8A33D','#8AA9A6','#C98A4B','#5A6E8C','#9C6B8E','#7A9A6B','#B85C5C'];

function dimLine(ctx,x1,y1,x2,y2,label){
  ctx.strokeStyle='#8A94A0';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1),t=3.5,px=Math.cos(a+Math.PI/2)*t,py=Math.sin(a+Math.PI/2)*t;
  [[x1,y1],[x2,y2]].forEach(([x,y])=>{ctx.beginPath();ctx.moveTo(x-px,y-py);ctx.lineTo(x+px,y+py);ctx.stroke();});
  const mx=(x1+x2)/2,my=(y1+y2)/2,horiz=Math.abs(y2-y1)<Math.abs(x2-x1);
  ctx.font='600 10px ui-monospace,monospace';const w=ctx.measureText(label).width;
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(horiz){ctx.fillStyle='#fff';ctx.fillRect(mx-w/2-3,my-7,w+6,13);ctx.fillStyle='#4A5560';ctx.fillText(label,mx,my);}
  else{ctx.save();ctx.translate(mx,my);ctx.rotate(-Math.PI/2);ctx.fillStyle='#fff';ctx.fillRect(-w/2-3,-7,w+6,13);ctx.fillStyle='#4A5560';ctx.fillText(label,0,0);ctx.restore();}
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}
function shade(hex,f){ // f>1 schiarisce, f<1 scurisce
  const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r*f));g=Math.min(255,Math.round(g*f));b=Math.min(255,Math.round(b*f));
  return`rgb(${r},${g},${b})`;
}

// costruisce uno spec disegnabile dalla geometria letta, se il motore non lo fornisce
function buildSpecFromGeo(g,archetipo){
  if(!g) return null;
  if(archetipo==='strati')
    return {vista:'strati',W:g.W||600,P:Math.round((g.H||400)*0.7),
      parti:[{nome:'Strato 1',colore:PAL[0],spessore:Math.round((g.H||200)/3)},
             {nome:'Strato 2',colore:PAL[1],spessore:Math.round((g.H||200)/3)},
             {nome:'Strato 3',colore:PAL[2],spessore:Math.round((g.H||200)/3)}]};
  if(g.grid||archetipo==='estrusione_moduli'||archetipo==='estrusione_vani')
    return {vista:'moduli',W:g.W||600,H:g.H||400,
      cols:g.grid?g.grid.cols:3,rows:g.grid?g.grid.rows:2,
      colore:PAL[0],fori:g.cerchi||0};
  // profilo / estrusione generica
  return {vista:'profilo',
    parti:[{nome:'Corpo',colore:PAL[0],lunghezza:g.W||120,forma:'cilindro',d:Math.max(20,Math.round((g.H||30)))}]};
}

function renderDisegno(canvas,spec,esploso){
  if(!canvas||!spec) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const CW=canvas.clientWidth||520,CH=canvas.clientHeight||360;
  canvas.width=CW*dpr;canvas.height=CH*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,CW,CH);
  if(spec.vista==='strati') drawStrati(ctx,CW,CH,spec,esploso);
  else if(spec.vista==='moduli') drawModuli(ctx,CW,CH,spec,esploso);
  else if(spec.vista==='assieme') { if(spec.kind==='sedia') drawSedia(ctx,CW,CH,spec,esploso); else drawAssieme(ctx,CW,CH,spec,esploso); }
  else drawProfilo(ctx,CW,CH,spec,esploso);
}

function drawStrati(ctx,CW,CH,spec,esploso){
  const parti=spec.parti||[];if(!parti.length)return;
  const totH=parti.reduce((s,p)=>s+(+p.spessore||0),0)||1;
  const W=+spec.W||600;
  const gap=esploso?18:0, gaps=gap*(parti.length-1);
  const marginR=76, marginL=8, marginT=16, marginB=30;
  const depth=22;
  const ON=(spec.onde&&+spec.onde.n>0)?spec.onde:null;      /* ← il profilo ondulato */
  const availW=CW-marginL-marginR-depth, availH=CH-marginT-marginB-depth-gaps;
  const sc=Math.min(availW/W,availH/(totH*(ON?1.25:1)));
  const bw=W*sc;
  const x0=marginL+ (availW-bw)/2 + 4;
  const A = ON ? (ON.amp>0 ? Math.min(ON.amp*sc, totH*sc*0.22) : Math.min(totH*sc*0.10,15)) : 0;
  const STEP=Math.max(2,bw/140);
  function wy(x){ return ON ? A*Math.sin((x-x0)/bw*ON.n*Math.PI*2) : 0; }
  /* la faccia SUPERIORE del materasso è piatta (ci si dorme), la INFERIORE pure (appoggia sul letto).
     le onde stanno DENTRO, fra strato e strato. */
  function wyT(x,i){ return (i===parti.length-1) ? 0 : wy(x); }   /* i = indice dal basso: l'ultimo è in cima → piatto */
  function wyB(x,i){ return (i===0) ? 0 : wy(x); }                /* il primo è in basso → piatto */
  let y=CH-marginB-(ON?A:0);
  const drawn=[];
  parti.slice().reverse().forEach((p,ri)=>{
    const iB=ri;                              /* si disegna dal basso: ri=0 è lo strato di fondo */
    const h=(+p.spessore||0)*sc;
    const yt=y-h;
    if(ON){
      /* strato ONDULATO: due curve parallele (sopra e sotto) — si annidano come nel pressato vero */
      ctx.beginPath();                                    /* faccia superiore (in prospettiva) */
      ctx.moveTo(x0,yt+wyT(x0,iB));
      for(let x=x0+STEP;x<=x0+bw;x+=STEP)ctx.lineTo(x,yt+wyT(x,iB));
      ctx.lineTo(x0+bw,yt+wyT(x0+bw,iB));
      ctx.lineTo(x0+bw+depth,yt+wyT(x0+bw,iB)-depth);
      for(let x=x0+bw;x>=x0;x-=STEP)ctx.lineTo(x+depth,yt+wyT(x,iB)-depth);
      ctx.closePath();
      ctx.fillStyle=shade(p.colore||'#888',1.18);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
      const wRt=wyT(x0+bw,iB), wRb=wyB(x0+bw,iB);        /* fianco destro */
      ctx.beginPath();ctx.moveTo(x0+bw,yt+wRt);ctx.lineTo(x0+bw+depth,yt+wRt-depth);ctx.lineTo(x0+bw+depth,yt+h+wRb-depth);ctx.lineTo(x0+bw,yt+h+wRb);ctx.closePath();
      ctx.fillStyle=shade(p.colore||'#888',.78);ctx.fill();ctx.stroke();
      ctx.beginPath();                                    /* fronte: la fascia fra le due curve */
      ctx.moveTo(x0,yt+wyT(x0,iB));
      for(let x=x0+STEP;x<=x0+bw;x+=STEP)ctx.lineTo(x,yt+wyT(x,iB));
      ctx.lineTo(x0+bw,yt+h+wyB(x0+bw,iB));
      for(let x=x0+bw;x>=x0;x-=STEP)ctx.lineTo(x,yt+h+wyB(x,iB));
      ctx.closePath();
      ctx.fillStyle=p.colore||'#888';ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(x0,yt);ctx.lineTo(x0+depth,yt-depth);ctx.lineTo(x0+depth+bw,yt-depth);ctx.lineTo(x0+bw,yt);ctx.closePath();
      ctx.fillStyle=shade(p.colore||'#888',1.18);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.moveTo(x0+bw,yt);ctx.lineTo(x0+depth+bw,yt-depth);ctx.lineTo(x0+depth+bw,yt-depth+h);ctx.lineTo(x0+bw,y);ctx.closePath();
      ctx.fillStyle=shade(p.colore||'#888',.78);ctx.fill();ctx.stroke();
      ctx.fillStyle=p.colore||'#888';ctx.fillRect(x0,yt,bw,h);ctx.strokeStyle='rgba(0,0,0,.3)';ctx.strokeRect(x0,yt,bw,h);
    }
    drawn.push({p,yt,h,y});
    ctx.font='600 10px ui-monospace,monospace';ctx.fillStyle='#fff';ctx.textBaseline='middle';
    if(h>14){ctx.fillText(' '+(p.nome||''),x0+4,yt+h/2+(ON?wyT(x0+bw*0.12,iB)*0.5:0));}
    ctx.textBaseline='alphabetic';
    dimLine(ctx,x0+depth+bw+14,yt-depth,x0+depth+bw+14,yt-depth+h,(+p.spessore||0)+'');
    y=yt-gap;
  });
  // quota totale (estrema destra) e larghezza (basso)
  const topY=y+gap;
  dimLine(ctx,x0+depth+bw+52,topY-depth,x0+depth+bw+52,CH-marginB-depth,'H '+totH);
  dimLine(ctx,x0,CH-marginB+14,x0+bw,CH-marginB+14,'L '+W);
  ctx.font='600 11px ui-monospace,monospace';ctx.fillStyle='#6B7680';
  ctx.fillText((esploso?'esploso':'compatto')+' · '+parti.length+' strati'+(spec.onde&&spec.onde.n>0?(' · '+spec.onde.n+' onde'):''),4,14);
}

function drawModuli(ctx,CW,CH,spec,esploso){
  const W=+spec.W||600,H=+spec.H||400,cols=Math.max(1,+spec.cols||3),rows=Math.max(1,+spec.rows||2);
  const marginL=44,marginR=16,marginT=16,marginB=34,depth=20;
  const availW=CW-marginL-marginR-depth, availH=CH-marginT-marginB-depth;
  const sc=Math.min(availW/W,availH/H);
  const bw=W*sc,bh=H*sc;
  const x0=marginL+(availW-bw)/2, y0=marginT+(availH-bh)/2;
  const col='#E9E7E0';
  // estrusione retro
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x0+depth,y0-depth);ctx.lineTo(x0+depth+bw,y0-depth);ctx.lineTo(x0+bw,y0);ctx.closePath();
  ctx.fillStyle=shade(col,1.05);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x0+bw,y0);ctx.lineTo(x0+depth+bw,y0-depth);ctx.lineTo(x0+depth+bw,y0-depth+bh);ctx.lineTo(x0+bw,y0+bh);ctx.closePath();
  ctx.fillStyle=shade(col,.82);ctx.fill();ctx.stroke();
  // fronte contenitore
  ctx.fillStyle=col;ctx.fillRect(x0,y0,bw,bh);ctx.strokeStyle='#4A5560';ctx.lineWidth=1.6;ctx.strokeRect(x0,y0,bw,bh);
  // moduli
  const pad=Math.min(bw,bh)*0.05;
  const gw=(bw-pad*(cols+1))/cols, gh=(bh-pad*(rows+1))/rows;
  const pop=esploso?Math.min(gw,gh)*0.16:0;
  const cx=x0+bw/2, cy=y0+bh/2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    let mx=x0+pad+c*(gw+pad), my=y0+pad+r*(gh+pad);
    if(esploso){const dirx=(mx+gw/2-cx),diry=(my+gh/2-cy);const dl=Math.hypot(dirx,diry)||1;mx+=dirx/dl*pop*3;my+=diry/dl*pop*3;}
    ctx.fillStyle=spec.colore||PAL[0];ctx.globalAlpha=.9;ctx.fillRect(mx,my,gw,gh);ctx.globalAlpha=1;
    ctx.strokeStyle=shade(spec.colore||PAL[0],.6);ctx.lineWidth=1;ctx.strokeRect(mx,my,gw,gh);
  }
  // fori lungo il bordo basso
  const nf=Math.min(+spec.fori||0,12);
  for(let i=0;i<nf;i++){const fx=x0+ (bw*(i+1)/(nf+1)), fy=y0+bh-6;
    ctx.beginPath();ctx.arc(fx,fy,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#8A4444';ctx.stroke();}
  // quote
  dimLine(ctx,x0,y0+bh+16,x0+bw,y0+bh+16,'L '+W);
  dimLine(ctx,x0-16,y0,x0-16,y0+bh,'H '+H);
  dimLine(ctx,x0+pad,y0+pad-7,x0+pad+gw,y0+pad-7,Math.round(W/cols-8)+'');
  ctx.font='600 11px ui-monospace,monospace';ctx.fillStyle='#6B7680';
  ctx.fillText((esploso?'esploso':'compatto')+' · '+cols+'×'+rows+' moduli',4,14);
}

function drawProfilo(ctx,CW,CH,spec,esploso){
  const parti=spec.parti||[];if(!parti.length)return;
  const totL=parti.reduce((s,p)=>s+(+p.lunghezza||0),0)||1;
  const maxD=Math.max(...parti.map(p=>+p.d||10));
  const gap=esploso?16:0, gaps=gap*(parti.length-1);
  const marginX=48,marginTop=30,marginBot=34;
  const availW=CW-marginX*2-gaps, availH=CH-marginTop-marginBot;
  const sc=Math.min(availW/totL, availH/maxD);
  const cy=marginTop+availH/2;
  let x=marginX;
  parti.forEach((p,idx)=>{
    const L=(+p.lunghezza||0)*sc, D=(+p.d||10)*sc, forma=p.forma||'cilindro';
    const top=cy-D/2, bot=cy+D/2;
    ctx.fillStyle=p.colore||PAL[idx%PAL.length];ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.2;
    if(forma==='cono'){
      // punta: triangolo che si assottiglia verso l'esterno (idx 0 = punta a sx)
      const tipLeft = idx===0;
      ctx.beginPath();
      if(tipLeft){ctx.moveTo(x,cy);ctx.lineTo(x+L,top);ctx.lineTo(x+L,bot);}
      else{ctx.moveTo(x,top);ctx.lineTo(x,bot);ctx.lineTo(x+L,cy);}
      ctx.closePath();ctx.fill();ctx.stroke();
    }else if(forma==='esagono'){
      const f=D*0.16;
      ctx.beginPath();ctx.rect(x,top,L,D);ctx.fill();ctx.stroke();
      ctx.fillStyle=shade(p.colore||'#888',1.2);ctx.fillRect(x,top,L,f);       // faccetta chiara sopra
      ctx.fillStyle=shade(p.colore||'#888',.8);ctx.fillRect(x,bot-f,L,f);      // faccetta scura sotto
      ctx.strokeRect(x,top,L,D);
    }else{ // cilindro
      const rr=Math.min(D/2,6);
      ctx.beginPath();ctx.moveTo(x+rr,top);ctx.lineTo(x+L-rr,top);
      ctx.quadraticCurveTo(x+L,top,x+L,top+rr);ctx.lineTo(x+L,bot-rr);ctx.quadraticCurveTo(x+L,bot,x+L-rr,bot);
      ctx.lineTo(x+rr,bot);ctx.quadraticCurveTo(x,bot,x,bot-rr);ctx.lineTo(x,top+rr);ctx.quadraticCurveTo(x,top,x+rr,top);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.22)';ctx.fillRect(x+rr,top+2,Math.max(0,L-rr*2),Math.max(1,D*0.16)); // riflesso
    }
    // nome + quota lunghezza
    ctx.font='600 9.5px ui-monospace,monospace';ctx.fillStyle='#4A5560';ctx.textAlign='center';
    if(L>26)ctx.fillText(p.nome||'',x+L/2,top-6);
    ctx.textAlign='left';
    dimLine(ctx,x,bot+14,x+L,bot+14,(+p.lunghezza||0)+'');
    x+=L+gap;
  });
  // quota totale + diametro
  dimLine(ctx,marginX,CH-12,x-gap,CH-12,'L '+totL);
  dimLine(ctx,marginX-14,cy-maxD*sc/2,marginX-14,cy+maxD*sc/2,'Ø'+maxD);
  ctx.font='600 11px ui-monospace,monospace';ctx.fillStyle='#6B7680';
  ctx.fillText((esploso?'esploso':'compatto')+' · '+parti.length+' parti',4,14);
}

// vista ASSIEME: parti posizionate in coordinate normalizzate 0..100 (elevazione frontale)
function drawAssieme(ctx,CW,CH,spec,esploso){
  const parti=(spec.parti||[]).filter(p=>!p.hidden);if(!parti.length)return;
  const marginL=46,marginR=20,marginT=18,marginB=34;
  const bw=CW-marginL-marginR, bh=CH-marginT-marginB;
  const N=(nx,ny)=>[marginL+nx/100*bw, marginT+ny/100*bh];
  // centroide per l'esploso
  let cx=0,cy=0;parti.forEach(p=>{cx+=p.x+p.w/2;cy+=p.y+p.h/2;});cx/=parti.length;cy/=parti.length;
  const k=esploso?0.35:0;
  parti.forEach(p=>{
    const ex=(p.x+p.w/2-cx)*k, ey=(p.y+p.h/2-cy)*k;
    const [x,y]=N(p.x+ex, p.y+ey);
    const w=p.w/100*bw, h=p.h/100*bh;
    ctx.fillStyle=p.colore||'#8AA9A6';ctx.strokeStyle='rgba(0,0,0,.32)';ctx.lineWidth=1.3;
    if(p.shape==='ellisse'){
      ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else{ // rect arrotondato
      const r=Math.min(w,h)*0.18;
      ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();ctx.fill();ctx.stroke();
    }
    if(esploso && p.nome && w>18){ctx.font='600 9px ui-monospace,monospace';ctx.fillStyle='#4A5560';ctx.textAlign='center';ctx.fillText(p.nome,x+w/2,y-3);ctx.textAlign='left';}
  });
  // quote complessive dichiarate
  if(spec.H){const[,y0]=N(0,4),[,y1]=N(0,96);dimLine(ctx,marginL-16,y0,marginL-16,y1,'H '+spec.H);}
  if(spec.W){const[x0]=N(18,0),[x1]=N(82,0);dimLine(ctx,x0,CH-marginB+16,x1,CH-marginB+16,'base '+spec.W);}
  if(spec.Lseduta){const[sx]=N(30,0),[sx2]=N(70,0);dimLine(ctx,sx,marginT+bh*0.56,sx2,marginT+bh*0.56,'seduta '+spec.Lseduta);}
  ctx.font='600 11px ui-monospace,monospace';ctx.fillStyle='#6B7680';
  ctx.fillText((esploso?'esploso':'assieme')+' · '+parti.length+' componenti',4,14);
}

// costruisce l'assieme SEDIA dalle quote/variabili dichiarate
function buildSedia(dim,opts){
  opts=opts||{};
  const riv=opts.coloreRiv||'#4E5D6C', metal='#9AA3AB', metalD='#7C858C', nero='#2E3238';
  const parti=[
    {key:'schienale',nome:'Schienale',riv:true,colore:riv,shape:'rect',x:36,y:6,w:28,h:30},
    {key:'poggiatesta',nome:'Poggiatesta',riv:true,colore:riv,shape:'rect',x:41,y:1,w:18,h:7,hidden:!opts.poggiatesta},
    {key:'seduta',nome:'Seduta',riv:true,colore:riv,shape:'rect',x:30,y:40,w:40,h:12},
    {key:'bracciolo_sx',nome:'Bracciolo',colore:nero,shape:'rect',x:24,y:40,w:6,h:16,hidden:!opts.braccioli},
    {key:'bracciolo_dx',nome:'Bracciolo',colore:nero,shape:'rect',x:70,y:40,w:6,h:16,hidden:!opts.braccioli},
    {key:'pistone',nome:'Pistone',colore:metal,shape:'rect',x:47,y:52,w:6,h:22},
    {key:'base',nome:'Base a stella',colore:metalD,shape:'ellisse',x:26,y:74,w:48,h:9}
  ];
  for(let i=0;i<5;i++) parti.push({key:'ruota_'+i,nome:i===0?'Ruote':'',colore:nero,shape:'ellisse',x:26+i*11.5,y:84,w:6,h:5});
  return {vista:'assieme',kind:'sedia',

}

// helper: rettangolo arrotondato + gradiente verticale
function rr(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function vgrad(ctx,y,h,c1,c2){const g=ctx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}

// RENDERER SEDIA dedicato — razze, cuscini, volumi, ombre
function drawSedia(ctx,CW,CH,spec,esploso){
  const P=spec.parti||[];
  const findK=k=>P.find(p=>p.key===k)||{};
  const riv=findK('seduta').colore||'#4E5D6C';
  const rivHi=shade(riv,1.22), rivLo=shade(riv,.72);
  const metalHi='#D3D8DC', metal='#AEB5BB', metalLo='#868D93', nero='#33383F', neroHi='#4A5058';
  const braccioli=!findK('bracciolo_sx').hidden;
  const poggia=!findK('poggiatesta').hidden;

  const mL=48,mR=22,mT=14,mB=34;
  const bw=CW-mL-mR, bh=CH-mT-mB;
  const cx=mL+bw/2;
  const seatW=Math.max(bw*0.30, Math.min(bw*0.60,(spec.Lseduta||520)/700*bw*0.62));
  const g=esploso? bh*0.05 : 0;

  // ancore verticali (con scostamenti esploso)
  const seatTop = mT+bh*0.46 + (esploso?0:0);
  const seatH   = bh*0.085;
  const seatX   = cx-seatW/2;
  const backH   = bh*0.34, backW=seatW*0.86, backX=cx-backW/2;
  const backBottom = seatTop - g*1.2;
  const backTop = backBottom - backH;
  const cylTop  = seatTop+seatH + g*0.8;
  const baseY   = mT+bh*0.86 + g*1.6;
  const cylBottom = baseY;

  ctx.save();
  ctx.lineJoin='round';

  // ombra a terra
  ctx.save();ctx.fillStyle='rgba(30,35,45,.14)';
  ctx.beginPath();ctx.ellipse(cx,baseY+16,seatW*0.95,10,0,0,Math.PI*2);ctx.fill();ctx.restore();

  // ── BASE A STELLA (5 razze in prospettiva) + ruote ──
  const span=seatW*1.35, hub={x:cx,y:baseY};
  const castors=[];
  for(let i=0;i<5;i++){const f=(i/4-0.5);const wx=cx+f*span;const wy=baseY+14+(0.5-Math.abs(f))*-4;castors.push({x:wx,y:wy,f});}
  // razze (dietro all'hub)
  castors.forEach(c=>{
    ctx.beginPath();
    ctx.moveTo(hub.x-4,hub.y-2);ctx.lineTo(hub.x+4,hub.y-2);
    ctx.lineTo(c.x+5,c.y-3);ctx.lineTo(c.x-5,c.y-3);ctx.closePath();
    ctx.fillStyle=vgrad(ctx,baseY-6,12,metalHi,metalLo);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1;ctx.stroke();
  });
  // ruote
  castors.forEach(c=>{
    ctx.beginPath();ctx.ellipse(c.x,c.y+3,7,5,0,0,Math.PI*2);
    ctx.fillStyle=vgrad(ctx,c.y-2,10,neroHi,nero);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
  });
  // hub
  ctx.beginPath();ctx.ellipse(hub.x,hub.y,10,5,0,0,Math.PI*2);
  ctx.fillStyle=vgrad(ctx,hub.y-5,10,metalHi,metal);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.stroke();

  // ── PISTONE (cilindro a gas) ──
  const cylW=Math.max(9,seatW*0.10);
  ctx.fillStyle=vgrad(ctx,cylTop,cylBottom-cylTop,metalHi,metalLo);
  rr(ctx,cx-cylW/2,cylTop,cylW,cylBottom-cylTop,cylW*0.3);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
  // riflesso pistone
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(cx-cylW*0.28,cylTop+2,cylW*0.18,cylBottom-cylTop-4);

  // ── BRACCIOLI (montante + bracciolo a L) ──
  if(braccioli){
    [-1,1].forEach(s=>{
      const px=cx+s*(seatW/2+6);
      // montante
      ctx.fillStyle=vgrad(ctx,seatTop-2,seatH+18,neroHi,nero);
      rr(ctx,px-3,seatTop-2,6,seatH+18,3);ctx.fill();
      // bracciolo (pad)
      const padW=seatW*0.26;
      ctx.fillStyle=vgrad(ctx,seatTop-14,10,'#4A5058',nero);
      rr(ctx, s<0? px-padW+4 : px-4, seatTop-14, padW, 10, 5);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.stroke();
    });
  }

  // ── SEDUTA (cuscino con fianco/bolster e spessore) ──
  // spessore frontale
  ctx.fillStyle=rivLo;rr(ctx,seatX,seatTop+seatH*0.55,seatW,seatH*0.7,seatH*0.35);ctx.fill();
  // top cuscino
  ctx.fillStyle=vgrad(ctx,seatTop,seatH,rivHi,riv);
  rr(ctx,seatX,seatTop,seatW,seatH,seatH*0.45);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1.2;ctx.stroke();
  // bolster laterali (rilievi)
  ctx.fillStyle=shade(riv,1.1);
  rr(ctx,seatX+2,seatTop+2,seatW*0.14,seatH-4,seatH*0.3);ctx.fill();
  rr(ctx,seatX+seatW-2-seatW*0.14,seatTop+2,seatW*0.14,seatH-4,seatH*0.3);ctx.fill();

  // ── SCHIENALE (sagomato, con lombare) ──
  ctx.fillStyle=vgrad(ctx,backTop,backH,rivHi,riv);
  // profilo con vita stretta (lombare)
  const bx=backX,bw2=backW,bt=backTop,bb=backBottom,waist=bw2*0.12;
  ctx.beginPath();
  ctx.moveTo(bx+bw2*0.14,bt);
  ctx.quadraticCurveTo(bx,bt,bx,bt+backH*0.18);
  ctx.quadraticCurveTo(bx+waist*0.3,bt+backH*0.55,bx+bw2*0.06,bb-4); // fianco sx con lombare
  ctx.quadraticCurveTo(bx,bb,bx+bw2*0.16,bb);
  ctx.lineTo(bx+bw2*0.84,bb);
  ctx.quadraticCurveTo(bx+bw2,bb,bx+bw2*0.94,bb-4);
  ctx.quadraticCurveTo(bx+bw2-waist*0.3,bt+backH*0.55,bx+bw2,bt+backH*0.18);
  ctx.quadraticCurveTo(bx+bw2,bt,bx+bw2*0.86,bt);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1.2;ctx.stroke();
  // cucitura centrale + lombare
  ctx.strokeStyle=shade(riv,.72);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,bt+6);ctx.lineTo(cx,bb-6);ctx.stroke();
  ctx.strokeStyle=shade(riv,1.25);ctx.beginPath();ctx.ellipse(cx,bt+backH*0.62,bw2*0.28,backH*0.12,0,0,Math.PI*2);ctx.stroke();

  // ── POGGIATESTA ──
  if(poggia){
    const phW=backW*0.6, phH=bh*0.09, phx=cx-phW/2, phy=backTop-phH-g*0.8;
    ctx.fillStyle=vgrad(ctx,phy,phH,rivHi,riv);rr(ctx,phx,phy,phW,phH,phH*0.4);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.28)';ctx.stroke();
    // collo
    ctx.fillStyle=nero;ctx.fillRect(cx-3,phy+phH-2,6,backTop-(phy+phH)+4);
  }

  ctx.restore();

  // ── QUOTE ──
  if(spec.H) dimLine(ctx,mL-16,backTop,mL-16,baseY+8,'H '+spec.H);
  if(spec.Lseduta) dimLine(ctx,seatX,seatTop-4,seatX+seatW,seatTop-4,'seduta '+spec.Lseduta);
  if(spec.W) dimLine(ctx,cx-span/2,CH-mB+16,cx+span/2,CH-mB+16,'base '+spec.W);
  ctx.font='600 11px ui-monospace,monospace';ctx.fillStyle='#6B7680';
  ctx.fillText((esploso?'esploso':'assieme')+' · sedia',4,14);
}


/* ── DISEGNATORE PROFILO (pressato) — 2D canvas ── */
function drawProfiloLib(canvas,spec){
  var dpr=Math.min(window.devicePixelRatio||1,2);var CW=canvas.clientWidth||520,CH=canvas.clientHeight||280;
  canvas.width=CW*dpr;canvas.height=CH*dpr;var ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,CW,CH);
  var out=spec.outline;if(!out||!out.length)return;
  var xs=out.map(function(p){return p.x;}),ys=out.map(function(p){return p.y;});
  var minx=Math.min.apply(null,xs),maxx=Math.max.apply(null,xs),miny=Math.min.apply(null,ys),maxy=Math.max.apply(null,ys);
  var w=(maxx-minx)||1,h=(maxy-miny)||1,pad=46,sc=Math.min((CW-pad*2)/w,(CH-pad*2)/h);
  var ox=CW/2,oy=CH/2,cx=(minx+maxx)/2,cy=(miny+maxy)/2;
  function X(x){return ox+(x-cx)*sc;}function Y(y){return oy-(y-cy)*sc;}
  ctx.beginPath();out.forEach(function(p,i){i?ctx.lineTo(X(p.x),Y(p.y)):ctx.moveTo(X(p.x),Y(p.y));});ctx.closePath();
  ctx.fillStyle=spec.colore||'#B4C4D6';ctx.fill();ctx.strokeStyle='#3A3F45';ctx.lineWidth=1.5;ctx.stroke();
  (spec.fori||[]).forEach(function(f){ctx.beginPath();ctx.arc(X(f.cx),Y(f.cy),(f.d/2)*sc,0,Math.PI*2);ctx.fillStyle='#FBFBFA';ctx.fill();ctx.strokeStyle='#8A4444';ctx.lineWidth=1.2;ctx.stroke();});
  ctx.font='11px ui-monospace,monospace';ctx.fillStyle='#6B7680';ctx.fillText(Math.round(w)+' × '+Math.round(h)+' cm',pad,CH-14);
}

/* ── DISEGNATORE DXF (mostra la geometria del CAD caricato) ── */
function drawDXF(canvas,geom){
  if(!geom||!canvas)return; var dpr=Math.min(window.devicePixelRatio||1,2);
  var CW=canvas.clientWidth||520,CH=canvas.clientHeight||220;
  canvas.width=CW*dpr;canvas.height=CH*dpr;var ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,CW,CH);
  var b=geom.bounds; if(!b)return; var w=(b.maxX-b.minX)||1,h=(b.maxY-b.minY)||1,pad=18,sc=Math.min((CW-pad*2)/w,(CH-pad*2)/h);
  var ox=pad+(CW-pad*2-w*sc)/2, oy=pad+(CH-pad*2-h*sc)/2;
  function X(x){return ox+(x-b.minX)*sc;} function Y(y){return CH-(oy+(y-b.minY)*sc);}
  ctx.strokeStyle='#2E3A46';ctx.lineWidth=1.2;ctx.lineJoin='round';
  (geom.polys||[]).forEach(function(p){ctx.beginPath();(p.pts||[]).forEach(function(pt,i){i?ctx.lineTo(X(pt[0]),Y(pt[1])):ctx.moveTo(X(pt[0]),Y(pt[1]));});if(p.closed)ctx.closePath();ctx.stroke();});
  ctx.strokeStyle='#0E6B66';
  (geom.circles||[]).forEach(function(c){ctx.beginPath();ctx.arc(X(c.cx),Y(c.cy),Math.max(1,c.r*sc),0,Math.PI*2);ctx.stroke();});
}

/* ── MOTORE 3D (assieme) — attivo con Three.js; offline si usa il fallback 2.5D ── */
var _3d=null;
function stop3D(){if(_3d){cancelAnimationFrame(_3d.raf);_3d=null;}}
function _m3(kind,color){if(kind==='metal')return new THREE.MeshStandardMaterial({color:color||0xAEB5BB,roughness:.35,metalness:.85});if(kind==='uph')return new THREE.MeshStandardMaterial({color:color,roughness:.85,metalness:.02});return new THREE.MeshStandardMaterial({color:color||0x33383F,roughness:.55,metalness:.15});}
function _sh(o){o.traverse(function(m){if(m.isMesh){m.castShadow=true;m.receiveShadow=true;}});return o;}
var MATTONI3D={
  box:function(p){return _sh(new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,p.d),_m3('plastic',p.color)));},
  cilindro:function(p){return _sh(new THREE.Mesh(new THREE.CylinderGeometry(p.r,p.r2||p.r,p.h,24),_m3('metal',p.color)));},
  cuscino:function(p){return _sh(new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,p.d),_m3('uph',p.color)));},
  pannello:function(p){var m=[_m3('uph',p.color),_m3('uph',p.color),_m3('uph',p.color),_m3('uph',p.color),_m3('uph',p.color),_m3('uph',p.back||p.color)];return _sh(new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,p.d),m));},
  stella:function(p){var g=new THREE.Group();g.add(new THREE.Mesh(new THREE.CylinderGeometry(p.hub||0.05,p.hub||0.05,0.05,20),_m3('metal',p.color)));for(var i=0;i<p.razze;i++){var a=i/p.razze*Math.PI*2;var arm=new THREE.Mesh(new THREE.BoxGeometry(p.r,0.03,0.05),_m3('metal',p.color));arm.position.set(Math.cos(a)*p.r/2,0,Math.sin(a)*p.r/2);arm.rotation.y=-a;g.add(arm);}return _sh(g);},
  ruota:function(p){var g=new THREE.Group();var w=new THREE.Mesh(new THREE.CylinderGeometry(p.r,p.r,0.03,20),_m3('plastic',p.gomma?0x2A2D31:0x40454C));w.rotation.z=Math.PI/2;g.add(w);return _sh(g);}
};
function monta3D(root,distinta,esploso){while(root.children.length)root.remove(root.children[0]);distinta.forEach(function(c){var b=MATTONI3D[c.tipo];if(!b)return;var o=b(c.params||{});var p=c.pos||[0,0,0];var e=(esploso&&c.expl)?c.expl:[0,0,0];o.position.set(p[0]+e[0],p[1]+e[1],p[2]+e[2]);root.add(o);});}
/* ══ MOTORE GLB con ESPLOSO — costante per QUALSIASI modello a componenti ══ */
/* legge i componenti dentro il GLB senza Three: il modello dichiara i suoi strati */
/* ══════ ANAGRAFICA — nessun dato nel motore: arriva dal server, ed è dell'azienda ══════
   cliente+materiale → FORNITORE → costo blocco ÷ lamine → costo strato
   + tempi (per strato, col suo fornitore) → × ricarico listino → PREZZO                */
var AZIENDA='default';                      /* domani: l'azienda dell'utente collegato */
var ANAG={fornitori:[],costi:[],listini:[]};   /* ← VUOTO. Il motore non sa nulla di nessuno. */
function anagCarica(cb){
  fetch('/api/anagrafica?azienda='+encodeURIComponent(AZIENDA))
    .then(function(r){return r.json();})
    .then(function(d){ ANAG={fornitori:d.fornitori||[],costi:d.costi||[],listini:d.listini||[]}; if(cb)cb(true); })
    .catch(function(){ if(cb)cb(false); });
}
function anagScrivi(tipo,righe,cb){
  fetch('/api/anagrafica/'+encodeURIComponent(tipo),{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({azienda:AZIENDA,righe:righe})})
  .then(function(r){return r.json();}).then(function(d){ANAG[tipo]=righe; if(cb)cb(d);})
  .catch(function(){ alert('Server non raggiungibile: anagrafica non salvata.'); });
}
function anagVuota(){ return !(ANAG.fornitori.length||ANAG.costi.length||ANAG.listini.length); }
function _eq(a,b){ if(a==='*'||a==null||a==='')return true; return _nrm(a)===_nrm(b); }
function fornitoreDi(cliente,materiale){
  var r=(ANAG.fornitori||[]).filter(function(x){return _eq(x.cliente,cliente)&&_eq(x.materiale,materiale);})
        .sort(function(a,b){return ((b.cliente!=='*')+(b.materiale!=='*'))-((a.cliente!=='*')+(a.materiale!=='*'));})[0];
  return r?r.fornitore:null;
}
function costoLamina(materiale,fornitore){
  var r=(ANAG.costi||[]).filter(function(x){return _eq(x.materiale,materiale)&&_eq(x.fornitore,fornitore);})[0];
  if(!r||!(r.lamine>0))return null;
  return {costo:r.costoBlocco/r.lamine, blocco:r.costoBlocco, lamine:r.lamine, fornitore:r.fornitore};
}
function _listinoDi(cliente,agente){
  return (ANAG.listini||[]).filter(function(x){return _eq(x.cliente,cliente)&&_eq(x.agente,agente);})
        .sort(function(a,b){return ((b.cliente!=='*')+(b.agente!=='*'))-((a.cliente!=='*')+(a.agente!=='*'));})[0]||null;
}
function ricaricoDi(cliente,agente){ var r=_listinoDi(cliente,agente); return r?r.ricarico:null; }
function provvigioneDi(cliente,agente){ var r=_listinoDi(cliente,agente); return (r&&r.provvigione!=null)?+r.provvigione:0; }
/* ── L'ANALISI: quanto costa · quanto lo vendo · quanto ci resta · quanto va all'agente ── */
function analisiRiga(r,C){
  var prezzo=prezzoRiga(r,C), costo=C.costo;
  var marg=prezzo-costo;
  var margPc=prezzo>0? (marg/prezzo*100) : 0;
  var pPc=provvigioneDi(ordine.cliente||'', ordine.agente||'');
  var prov=marg*pPc/100;
  return {costo:costo, materiali:costo-C.costoMano, manodopera:C.costoMano,
          prezzo:prezzo, margine:marg, marginePc:margPc,
          provvigionePc:pPc, provvigione:prov, netto:marg-prov};
}
function materialiAnag(){var m={};(ANAG.costi||[]).forEach(function(x){m[x.materiale]=1;});return Object.keys(m);}
function _nrm(s){return String(s==null?'':s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
/* legge la tabella tempi esportata dal simulatore: fase · reparto · minuti + le colonne-chiave */
function parseTabellaTempi(txt){
  var L=String(txt).split(/\r?\n/).filter(function(x){return x.trim();});
  if(L.length<2)return null;
  var sep=(L[0].split(';').length>L[0].split(',').length)?';':(L[0].split('\t').length>L[0].split(',').length?'\t':',');
  var head=L[0].split(sep).map(function(h){return h.trim().replace(/^"|"$/g,'');});

    }

/* ═══════════════════════════════════════════════════════════════════════
   MOTORE MUTO — non conosce NESSUNA parola di prodotto.
   Riceve struttura + comportamento dalla libreria; ogni etichetta è lib.voce.*
   ═══════════════════════════════════════════════════════════════════════ */
function EX(expr,scope){try{var ks=Object.keys(scope);return (new Function(...ks,'return ('+expr+')'))(...ks.map(function(k){return scope[k];}));}catch(e){return null;}}
function EB(expr,scope){return !!EX(expr,scope);}
function scopeOf(lib,cfg){var s=Object.assign({},cfg);s.round=Math.round;s.floor=Math.floor;s.ceil=Math.ceil;s.max=Math.max;s.min=Math.min;
  s.EQ=function(a,b){return String(a==null?'':a).toLowerCase().indexOf(String(b==null?'':b).toLowerCase())>=0;};
  s.__cod={}; (lib.campi||[]).forEach(function(c){ if(c.cod) Object.keys(c.cod).forEach(function(k){ s.__cod[k]=c.cod[k]; }); });
  /* VAR(campo) → la SIGLA dichiarata (rosso→ROS). Se non c'è, il valore in maiuscolo. */
  s.VAR=function(a){ var k=String(a==null?'':a).trim();
    if(s.__cod && s.__cod[k]!=null) return String(s.__cod[k]);
    return k.toUpperCase().replace(/[^A-Z0-9]+/g,'').substring(0,12); };
  s.EN=function(a){ if(typeof a==='number')return a; var m=String(a==null?'':a).replace(',','.').match(/-?[0-9]+(\.[0-9]+)?/); return m?parseFloat(m[0]):NaN; };
  if(lib.scopeExtra){Object.assign(s,lib.scopeExtra(cfg));}return s;}
function eur(n){return '€ '+(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function calcRiga(riga){
  var lib=LIB[riga.lib], s=scopeOf(lib,riga.cfg);
  var voci=[],costo=0,descr='';
  if(lib.calc){                       // libreria con liste (strati liberi): comportamento suo
    var res=lib.calc(riga.cfg,s);
    voci=res.voci; costo=res.costo; descr=res.descr; if(res.extra)Object.assign(s,res.extra);
  } else {                            // libreria a componenti dichiarativi
    lib.componenti.forEach(function(c){
      if(c.se && !EB(c.se,s)) return;
      var q=EX(c.qta,s)||0, pu=EX(c.prezzo,s)||0, cst=q*pu; costo+=cst;
      voci.push({cod:(EX('`'+c.cod+'`',s)||c.cod), nome:EX('`'+c.nome+'`',s)||c.nome, um:c.um, qta:q, costo:cst});
    });
    if(lib.manodopera){var m=EX(lib.manodopera,s)||0;costo+=m;}
    descr=EX('`'+lib.descr+'`',s)||'';
  }
  var cicli=[],costoMano=0;
  (lib.cicli||[]).forEach(function(cy){var min=EX(cy.min,s)||0;var tar=(lib.reparti&&lib.reparti[cy.reparto])||0.7;var c=min*tar;if(min>0){costoMano+=c;cicli.push({reparto:cy.reparto,fase:cy.fase,min:min,costo:c});}});
  /* ── TEMPI DAL SIMULATORE ── il taglio è per STRATO: ogni strato ha il suo materiale →
     il suo FORNITORE (imposto dal cliente) → e lo stesso materiale di fornitori diversi taglia diverso. */
  if(lib.tempi&&lib.tempi.righe){
    var COLS=lib.tempi.cols||[];
    var STR=Array.isArray(riga.cfg.strati)?riga.cfg.strati:[];
    function _matchRiga(rg,sc){
      var ok=true;
      COLS.forEach(function(k){
        if(!ok)return; var v=rg.chiavi[k.id];
        if(v===''||v==='*'||v==='-')return;
        var cv=(sc[k.id]!=null)?sc[k.id]:_valCampo(s,lib,k.id);
        if(cv==null||cv===''){ok=false;return;}
        if(_nrm(cv)!==_nrm(v)) ok=false;
      });
      return ok;
    }
    function _agg(rg,suf){
      if(!(rg.minuti>0))return;
      var tar=(lib.reparti&&lib.reparti[rg.reparto])||0.7, c=rg.minuti*tar;
      costoMano+=c; cicli.push({reparto:rg.reparto,fase:rg.fase+(suf||''),min:rg.minuti,costo:c,daSim:true});
    }
    lib.tempi.righe.forEach(function(rg){
      var perStrato = STR.length && COLS.some(function(k){var v=rg.chiavi[k.id];
        return /materiale|material|fornitore|spessore/.test(k.id) && v && v!=='*' && v!=='-';});
      if(perStrato){
        STR.forEach(function(st){
          var forn=fornitoreDi(ordine.cliente||'', st.mat||'');
          if(_matchRiga(rg,{materiale:(st.mat||''),fornitore:(forn||''),spessore:st.h,strato:(st.nome||'')}))
            _agg(rg,' · '+(st.nome||'strato')+' ('+(st.mat||'')+(forn?(' — '+forn):'')+')');
        });
      } else if(_matchRiga(rg,{})) _agg(rg,'');
    });
  }
  /* ── STRATI: ogni strato costa secondo il FORNITORE che il cliente impone ── */
  if(Array.isArray(riga.cfg.strati)&&riga.cfg.strati.length&&!lib.calc&&!anagVuota()){
    riga.cfg.strati.forEach(function(st,i){
      var mat=st.mat||''; if(!mat)return;
      var forn=fornitoreDi(ordine.cliente||'', mat);
      var cl=costoLamina(mat,forn); if(!cl)return;
      costo+=cl.costo;
      voci.push({cod:'MAT-'+('0'+(i+1)).slice(-2), nome:mat+' · '+(st.nome||'strato')+' — fornitore '+(cl.fornitore||'?')+' (blocco '+eur(cl.blocco)+' ÷ '+cl.lamine+' lamine)', um:'lamina', qta:1, costo:cl.costo});
    });
  }
  /* la manodopera entra nel costo (le librerie fisse hanno il loro calc: non le tocco) */
  if(!lib.calc) costo+=costoMano;
  var maggiora=0, esiti=[], sistemi={}, blocchi=[];
  (lib.regole||[]).forEach(function(rg){
    if(!rg.se||EB(rg.se,s)){
      if(rg.tipo==='maggiora')maggiora+=rg.valore;
      var msg=EX('`'+rg.msg+'`',s)||rg.msg;
      if(rg.sev==='block'){ if(msg)blocchi.push(msg); }
      else if(rg.msg)esiti.push({msg:msg,sev:rg.sev||'info'});
      (rg.sistemi||[]).forEach(function(x){sistemi[x]=1;});
    }
  });
  return {voci:voci,cicli:cicli,costoMano:costoMano,costo:costo,maggiora:maggiora,esiti:esiti,sistemi:sistemi,blocchi:blocchi,descr:descr,s:s};
}
function codiceRiga(riga){var lib=LIB[riga.lib];var parts=lib.codice.pos.map(function(p){var v=riga.cfg[p];var vv=lib.campi.find(function(c){return c.id===p;});if(vv&&vv.cod&&vv.cod[v]!=null)v=vv.cod[v];return v;});return lib.codice.padre+(lib.codice.pre!=null?lib.codice.pre:'#')+parts.join(lib.codice.sep!=null?lib.codice.sep:',');}

function payloadOrdine(){

      return {
        articolo_padre: (lib.codice&&lib.codice.padre)? lib.codice.padre : String(r.lib).toUpperCase().substring(0,12),
        codice_variante: (typeof codiceRiga==='function' && lib.codice)? codiceRiga(r) : null,
        descrizione: C.descr,

        /* le scelte, in ordine, come le ha fatte l'operatore */
        varianti: (lib.campi||[]).map(function(c){ return {campo:c.id, etichetta:c.label, valore:r.cfg[c.id]}; })
                   .filter(function(x){ return x.valore!==undefined && x.valore!==null && x.valore!==''; }),
        /* la distinta: i codici portano già le varianti (GRAD-001-ROSSO) */

        cicli: (C.cicli||[]).map(function(c){ return {reparto:c.reparto, fase:c.fase, minuti:c.min}; }),
        prezzo_unitario: A? +A.prezzo.toFixed(2) : null,

    })
  };
}
function ordineHaBlocchi(){
  try{ for(var i=0;i<ordine.righe.length;i++){ var r=ordine.righe[i]; var C=calcRiga(r); if(C.blocchi&&C.blocchi.length)return true; } }catch(e){}
  return false;
}
function registraOrdine(){
  if(ordineHaBlocchi()){ alert('Ci sono configurazioni non valide (⛔). Correggi prima di registrare l\'ordine.'); return; }
  if(ORDINE_CONGELATO){avvisoCongelato();return;}
  if(!ordine.righe.length){alert('Ordine vuoto: aggiungi almeno un prodotto.');return;}
  fetch('/api/offerte',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cliente_cod:ordine.cliente||'', creata_da:BRAND, payload:payloadOrdine()})})
  .then(function(r){return r.json();})
  .then(function(d){ if(d&&d.numero){ alert('Ordine registrato: '+d.numero+'\nParte una nuova commessa.'); nuovaCommessa(); rigaAttiva=null; boot(); } else { alert('Salvataggio non riuscito.'); } })
  .catch(function(){ alert('Server non raggiungibile: ordine non registrato. (Serve la connessione a Render.)'); });
}

function apriAnagrafica(){
  var pan=document.getElementById('addPanel');

   +'<div class="apg" style="max-height:70vh;overflow:auto">'
   +(anagVuota()?'<div style="padding:9px 11px;border:1px solid var(--amber);background:#FFFDF6;border-radius:8px;font-size:12px;color:#8A6D1A;margin-bottom:14px">Nessun dato caricato. Importa i fogli dell\'azienda: finché sono vuoti, il prezzo usa il margine della libreria.</div>':'')
   +_tabAnag('FORNITORI — il cliente impone il fornitore',['cliente','materiale','fornitore'],ANAG.fornitori,'«*» vale per tutti. La riga più specifica vince.','fornitori')
   +_tabAnag('COSTI — costo del cubotto e resa in lamine',['materiale','fornitore','costoBlocco','lamine'],ANAG.costi,'costo lamina = costo blocco ÷ lamine','costi')
   +_tabAnag('LISTINI — ricarico e provvigione',['cliente','agente','ricarico','provvigione'],ANAG.listini,'prezzo = costo × ricarico · provvigione = % sul margine','listini')
   +'</div>';
  document.getElementById('addClose').onclick=closeAdd;
  document.getElementById('addOv').onclick=closeAdd;
  pan.querySelectorAll('[data-imp]').forEach(function(b){b.onclick=function(){window.__anagTipo=b.getAttribute('data-imp');document.getElementById('fileANAG').click();};});
  /* MODIFICA una cella → salva sul database (il dato vero vive qui, non nell'Excel) */
  pan.querySelectorAll('[data-at]').forEach(function(inp){
    inp.onchange=function(){
      var tp=inp.getAttribute('data-at'), i=+inp.getAttribute('data-ai'), c=inp.getAttribute('data-ac');
      var v=inp.value;
      if(inp.type==='number') v=(v===''?0:(parseFloat(String(v).replace(',','.'))||0));
      ANAG[tp][i][c]=v;
      anagScrivi(tp, ANAG[tp], function(){ inp.classList.add('salvato'); setTimeout(function(){inp.classList.remove('salvato');},900); renderAll(); });
    };
  });
  /* TOGLI una riga */
  pan.querySelectorAll('[data-arm]').forEach(function(b){b.onclick=function(){
    var p=b.getAttribute('data-arm').split('_'), tp=p[0], i=+p[1];
    ANAG[tp].splice(i,1);
    anagScrivi(tp, ANAG[tp], function(){ apriAnagrafica(); renderAll(); });
  };});
  /* AGGIUNGI una riga */
  pan.querySelectorAll('[data-aadd]').forEach(function(b){b.onclick=function(){
    var tp=b.getAttribute('data-aadd');
    var nuova = tp==='fornitori' ? {cliente:'*',materiale:'*',fornitore:''}
              : tp==='costi'     ? {materiale:'',fornitore:'*',costoBlocco:0,lamine:1}
              :                    {cliente:'*',agente:'*',ricarico:1.38,provvigione:0};
    ANAG[tp].push(nuova);
    anagScrivi(tp, ANAG[tp], function(){ apriAnagrafica(); renderAll(); });
  };});
  pan.querySelectorAll('[data-del]').forEach(function(b){b.onclick=function(){var tp=b.getAttribute('data-del');
    if(!confirm('Svuotare la tabella '+tp+'?'))return;
    fetch('/api/anagrafica/'+tp+'?azienda='+encodeURIComponent(AZIENDA),{method:'DELETE'}).then(function(){ANAG[tp]=[];apriAnagrafica();renderAll();});};});
  pan.classList.add('open');document.getElementById('addOv').classList.add('open');
}

function richiamaOrdine(numero){
  fetch('/api/offerte/'+encodeURIComponent(numero)).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.payload){alert('Ordine non trovato.');return;}
    var p=d.payload;
    if(p.mondo && GRUPPI.find(function(g){return g.id===p.mondo;})){ mondoCorrente=p.mondo; mondoAttivo=GRUPPI.find(function(g){return g.id===p.mondo;}).primary; }
    ordine={numero:d.numero, data:p.data||d.data, cliente:p.cliente||d.cliente_cod, righe:p.righe||[]};
    ORDINE_STATO=d.stato; ORDINE_CONGELATO=!!d.congelato;
    rigaAttiva = ordine.righe.length? 0 : null;
    closeAdd(); boot();
    if(ORDINE_CONGELATO) setTimeout(function(){alert('Ordine '+d.numero+' è CONGELATO (preso dall\'ERP): sola lettura.');},100);
  }).catch(function(){ alert('Server non raggiungibile.'); });
}

function outlinePointsFor(cfg){var P=[];if(cfg.shape==='RETT'){var L=cfg.rett.L,W=cfg.rett.P,R=Math.min(cfg.rett.R,L/2,W/2),seg=8,hx=L/2,hy=W/2;var arc=function(cx,cy,a0,a1){for(var i=0;i<=seg;i++){var a=a0+(a1-a0)*i/seg;P.push({x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)});}};if(R>0){arc(hx-R,hy-R,0,Math.PI/2);arc(-hx+R,hy-R,Math.PI/2,Math.PI);arc(-hx+R,-hy+R,Math.PI,1.5*Math.PI);arc(hx-R,-hy+R,1.5*Math.PI,2*Math.PI);}else{P.push({x:hx,y:hy},{x:-hx,y:hy},{x:-hx,y:-hy},{x:hx,y:-hy});}}else if(cfg.shape==='POLY'){var n=cfg.poly.n,R2=cfg.poly.d/2,r0=(cfg.poly.rot||0)*Math.PI/180;for(var i=0;i<n;i++){var a=r0+2*Math.PI*i/n-Math.PI/2;P.push({x:R2*Math.cos(a),y:R2*Math.sin(a)});}}else{var a2=cfg.ell.a,b2=cfg.ell.b,s2=48;for(var i=0;i<s2;i++){var t=2*Math.PI*i/s2;P.push({x:a2/2*Math.cos(t),y:b2/2*Math.sin(t)});}}return P;}
function areaPoly(pts){var a=0;for(var i=0;i<pts.length;i++){var j=(i+1)%pts.length;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}return Math.abs(a/2);}
function perimPoly(pts){var p=0;for(var i=0;i<pts.length;i++){var j=(i+1)%pts.length;p+=Math.hypot(pts[j].x-pts[i].x,pts[j].y-pts[i].y);}return p;}
function bboxOf(pts){var mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;pts.forEach(function(p){mnx=Math.min(mnx,p.x);mxx=Math.max(mxx,p.x);mny=Math.min(mny,p.y);mxy=Math.max(mxy,p.y);});return {minx:mnx,maxx:mxx,miny:mny,maxy:mxy};}

function _normId(s){return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
function _resolveCampo(token,campi){var tk=_normId(token);
  for(var i=0;i<campi.length;i++){var c=campi[i];if(_normId(c.id)===tk||_normId(c.label)===tk)return c.id;}
  for(var i=0;i<campi.length;i++){var c=campi[i];if(_normId(c.label).indexOf(tk)>=0||(tk&&_normId(c.id).indexOf(tk)>=0))return c.id;}
  return null;}
function _condExpr(cond,campi){var parts=cond.split(/\s+(e|o)\s+/i),out='',ok=true;
  for(var i=0;i<parts.length;i++){var p=parts[i];
    if(/^(e|o)$/i.test(p)){out+=(p.toLowerCase()==='e'?' && ':' || ');continue;}
    var m=p.match(/(.+?)\s*(!=|diverso da|non è|non e|=|è|e|uguale a|:)\s*['\"]?([^'\"]+?)['\"]?\s*$/i);
    if(!m){ok=false;continue;}
    var field=_resolveCampo(m[1],campi);if(!field){ok=false;continue;}
    var neg=/!=|diverso|non /i.test(m[2]);

  return {expr:out||'false',ok:ok};}
/* Di quale campo parla questa regola? Serve a raggrupparle:
   con trenta regole in fila l'Officina non si governa più. */
function _regolaCampo(txt,campi){
  var m=String(txt||'').match(/se\s+(.+?)\s+allora/i);
  if(!m)return null;
  var cond=m[1];
  var best=null, pos=1e9;
  (campi||[]).forEach(function(c){
    [c.id, c.label].forEach(function(n){
      if(!n)return;
      var i=cond.toLowerCase().indexOf(String(n).toLowerCase());
      if(i>=0 && i<pos){ pos=i; best=c; }
    });
  });
  return best;
}
function parseVincolo(txt,campi){var t=String(txt||'').trim();
  var m=t.match(/se\s+(.+?)\s+allora\s+(.+)/i);if(!m)return null;
  var cond=m[1],az=m[2],c=_condExpr(cond,campi);if(!c.ok)return null;var am;
  /* «costa il 12% in più» · «prezzo +12%» · «maggiorazione del 12%» · «sconto del 5%»
     → una MAGGIORAZIONE vera sul prezzo (il motore la sa già applicare, mancava chi la scrivesse) */
  var mg=az.match(/([0-9]+(?:[.,][0-9]+)?)\s*%/);
  if(mg && /prezz|cost|maggior|aument|ricaric|supplement|sconto|riduz/i.test(az)){
    var perc=parseFloat(mg[1].replace(',','.'));
    var giu=/(sconto|riduz|diminu|in\s+meno)/i.test(az);
    return {se:'('+c.expr+')', tipo:'maggiora', valore:(giu?-perc:perc), sev:'info',
            msg:(giu?'−':'+')+perc+'% sul prezzo'};
  }
  if(am=az.match(/(.+?)\s+deve\s+essere\s+['\"]?([^'\"]+?)['\"]?\s*$/i)){
    var field=_resolveCampo(am[1],campi);if(!field)return null;var val=am[2].trim().replace(/'/g,'');
    /* «deve essere >= 800» è un CONFRONTO, non un'uguaglianza con la scritta ">= 800".
       Prima li trattavo come testo: la regola scattava sempre, anche quando era rispettata. */
    /* «multiplo di alzata» → confronto vero: il resto della divisione dev'essere zero */
    var mu=val.match(/multipl[oi]\s+(?:di\s+|dell[ao]\s+)?([a-z0-9_ àèéìòù]+?)(?:\s*\(|$)/i);
    if(mu){
      var f2=_resolveCampo(mu[1],campi);
      if(f2) return {se:'('+c.expr+') && !(EN('+f2+')>0 && Math.abs(EN('+field+') % EN('+f2+'))<0.001)',
                     sev:'block', msg:am[1].trim()+' deve essere un multiplo di '+mu[1].trim()};
    }
    var cf=val.match(/^(>=|<=|>|<|=|almeno|al\s*meno|minimo|non\s+meno\s+di|al\s*massimo|massimo|non\s+pi[uù]\s+di)\s*([0-9]+(?:[.,][0-9]+)?)\s*(?:mm|cm|m|kg|°)?$/i);
    if(cf){
      var op=cf[1].toLowerCase().replace(/\s+/g,' ');
      var n=parseFloat(cf[2].replace(',','.'));
      var js = /^(>=|almeno|al meno|minimo|non meno di)$/.test(op) ? '>='
             : /^(<=|al massimo|massimo|non più di|non piu di)$/.test(op) ? '<='
             : op==='>' ? '>' : op==='<' ? '<' : '==';
      return {se:'('+c.expr+') && !(EN('+field+') '+js+' '+n+')', sev:'block',
              msg:am[1].trim()+' deve essere '+js+' '+n};
    }
    /* Un blocco si può fare solo se il valore è VERIFICABILE: dev'essere uno dei valori
       dichiarati del campo, o un numero. Altrimenti è una frase che non so misurare:
       la mostro come avviso, non come divieto. (Prima bloccava per sempre.) */
    var cc=(campi||[]).filter(function(x){return x.id===field;})[0];
    var ammessi=(cc&&(cc.opz||cc.std)||[]).map(function(x){return String(x).toLowerCase().trim();});
    var vLow=val.toLowerCase().trim();
    var verificabile = ammessi.indexOf(vLow)>=0 || /^[0-9]+([.,][0-9]+)?$/.test(vLow);
    if(!verificabile)
      return {se:'('+c.expr+')', sev:'warn', msg:am[1].trim()+': '+val};
    return {se:'('+c.expr+') && !EQ('+field+",'"+val+"')", sev:'block', msg:am[1].trim()+' deve essere "'+val+'"'};}
  if(/non\s+selezionabil|vietat|obblig/i.test(az))
    return {se:'('+c.expr+')', sev:'block', msg:az.replace(/^.*?allora\s*/i,'')};
  return {se:'('+c.expr+')', sev:'warn', msg:az.replace(/^avviso[:\s]*/i,'').replace(/^['\"]|['\"]$/g,'')};}

function parseRegolaLib(txt){
  var t=(txt||'').toLowerCase(),cond=null,m;
  if(m=t.match(/(?:se\s+)?(\w+)\s+(?:=|è|uguale a|:)?\s*(\w+)/)){}
  var azione=null,val=0;
  if(m=t.match(/maggior\w*\s*(?:del\s*)?(\d+)/)){azione='maggiora';val=+m[1];}
  else if(/viet/.test(t))azione='avviso';
  else if(/avvis/.test(t))azione='avviso';
  // condizione: "se X è/uguale Y" oppure "se X > n"
  var se='true';
  if(m=t.match(/se\s+([a-zàèéìòù_]+)\s*(?:=|è|uguale a|:)\s*([a-zàèéìòù0-9]+)/)) se="String("+m[1]+")==='"+m[2]+"'";
  else if(m=t.match(/se\s+([a-zàèéìòù_]+)\s*>\s*(\d+)/)) se=m[1]+">"+m[2];
  return {se:se, tipo:azione||'avviso', valore:val, msg:txt, sev: azione==='maggiora'?'info':'warn'};
}
