      var i=+sel.getAttribute('data-vs'), c=d.campi[i];
      if(sel.value!=='__NUOVO__')return;                       /* ha solo guardato un valore */
      var inp=document.createElement('input'); inp.className='vnew'; inp.placeholder='scrivi il valore e premi Invio';
      sel.replaceWith(inp); inp.focus();
      var fatto=false;
      function prendi(){ if(fatto)return; fatto=true;
        var v=String(inp.value).trim();
        if(v){ var V=_valori(c); if(V.indexOf(v)<0){ V.push(v); _setValori(c,V); } }
        renderOfficina(); }
      inp.onkeydown=function(e){ if(e.key==='Enter')prendi(); if(e.key==='Escape'){fatto=true;renderOfficina();} };
      inp.onblur=prendi;
    };});
    body.querySelectorAll('[data-vx]').forEach(function(b){ b.onclick=function(){
      var i=+b.getAttribute('data-vx'), c=d.campi[i];
      var sel=body.querySelector('[data-vs="'+i+'"]'); if(!sel||sel.value==='__NUOVO__')return;
      var V=_valori(c), k=V.indexOf(sel.value);
      if(k>=0){ V.splice(k,1); _setValori(c,V); renderOfficina(); }
    };});
    /* aggiungi un valore: lo scrivi e lo prende */
    body.querySelectorAll('[data-va]').forEach(function(b){b.onclick=function(){
      var i=+b.getAttribute('data-va'), c=d.campi[i];
      var inp=document.createElement('input'); inp.className='valin'; inp.placeholder='valore + Invio';
      b.replaceWith(inp); inp.focus();
      var fatto=false;
      function agg(){ if(fatto)return; fatto=true;
        var v=String(inp.value).trim();
        if(v){ var V=_valori(c); if(V.indexOf(v)<0){ V.push(v); _setValori(c,V); } }
        officina._apri=i; renderOfficina(); }
      inp.onkeydown=function(e){ if(e.key==='Enter')agg(); if(e.key==='Escape'){fatto=true;renderOfficina();} };
      inp.onblur=agg; };});
    body.querySelectorAll('[data-cd]').forEach(function(b){b.onclick=function(){d.campi.splice(+b.getAttribute('data-cd'),1);renderOfficina();};});
    body.querySelectorAll('[data-rg]').forEach(function(dt){dt.addEventListener('toggle',function(){officina._apriReg=dt.open?dt.getAttribute('data-rg'):null;});});
    body.querySelectorAll('[data-ra]').forEach(function(bb){bb.onclick=function(){
      var k=bb.getAttribute('data-ra');
      var c=(d.campi||[]).filter(function(x){return x.id===k;})[0];
      d.regoleText.push(c? ("se "+c.id+" = '' allora ") : "se  allora ");
      officina._apriReg=k; renderOfficina();
      var ins=document.querySelectorAll('[data-ri]'); if(ins.length)ins[ins.length-1].focus();
    };});
    body.querySelectorAll('[data-ri]').forEach(function(el){el.oninput=function(){d.regoleText[+el.getAttribute('data-ri')]=el.value;};el.onchange=function(){renderOfficina();};});
    body.querySelectorAll('[data-rd]').forEach(function(b){b.onclick=function(){d.regoleText.splice(+b.getAttribute('data-rd'),1);renderOfficina();};});
    document.getElementById('dNome').oninput=function(e){d.nome=e.target.value;};
    document.getElementById('dMot').onchange=function(e){d.motore=e.target.value;};
    document.getElementById('dAddCampo').onclick=function(){d.campi.push({id:'c'+Date.now(),label:'Nuovo campo',tipo:'testo'});renderOfficina();};
    var _bc=document.getElementById('dAddColori');
    if(_bc)_bc.onclick=function(){
      var PAL=['bianco','grigio','nero','rosso','arancio','giallo','verde','azzurro','blu','viola','beige','antracite'];
      officina.glbParti.forEach(function(nome,i){
        var id='colore_strato_'+(i+1);
        if(d.campi.some(function(c){return c.id===id;}))return;
        var pulito=nome.replace(/^Layer[_\s-]*\d+[_\s-]*/i,'').replace(/[_-]+/g,' ').replace(/ondulato|ondulata/i,'').trim();
        var suo=PAL.filter(function(c){return pulito.toLowerCase().indexOf(c)>=0;})[0];   /* il colore è nel nome dello strato */
        var lista=suo? [suo].concat(PAL.filter(function(c){return c!==suo;})) : PAL.slice();
        d.campi.push({id:id, label:'Colore '+(pulito||('strato '+(i+1))), tipo:'scelta', opz:lista});
      });
      renderOfficina();
    };
    document.getElementById('dAddReg').onclick=function(){d.regoleText.push('se ... allora ...');renderOfficina();};
    document.getElementById('dIndietro').onclick=function(){officina.step='ingresso';renderOfficina();};
    document.getElementById('dSalva').onclick=salvaLibreria;
  }
}

function salvaLibreria(){
  var d=officina.draft, id=officina.target;
  var nuovoMondo=(officina.mondoTarget==='nuovo');
  var corniceBase=nuovoMondo?VOCE_NEUTRA:VOCE_CORNICE;              // mondo nuovo → cornice SUA; prodotto in mondo esistente → cornice del mondo
  var clientiBase=nuovoMondo?CLIENTI_NEUTRO:CLIENTI_MAT;
  var lib={
    voce:Object.assign({},corniceBase,{
      mondo:nuovoMondo?(officina.titolo||d.nome):corniceBase.mondo,
      nuovo:d.nome,sigla:(d.nome||'PRD').substring(0,3).toUpperCase(),compatto:'Compatto',esploso:'Esploso',
      sezEditor:d.nome.toUpperCase(),sezDash:d.nome.toUpperCase()+' IN CIFRE',prezzoRiga:'Prezzo '+d.nome.toLowerCase(),
      distintaCols:{cod:'Cod',comp:'Voce',qta:'Q.tà',um:'UM'},sezDistinta:'Distinta — '+d.nome.toLowerCase(),
      offertaTitolo:'Offerta — '+(nuovoMondo?(officina.titolo||d.nome):d.nome.toLowerCase()),descrizione:'Configurazione',qtaBreve:'pz',codiceArt:'Codice',totale:'Totale ordine',
      disclaimer:'Libreria nata dal Narratore, regole confermate a mano.',btnOfferta:'↓ Offerta',ordineVuoto:'Nessun prodotto.'}),
    clienti:clientiBase, motore:(d.motore||(officina.glb?'glb':(d.geom?'dxf':'strati'))), glbData:(officina.glb||null),
    elementi:(d.elementi||[]),
    tempi:(officina.tempi||null),
    reparti:(function(){var R={};if(officina.tempi)officina.tempi.righe.forEach(function(x){if(x.reparto&&R[x.reparto]==null)R[x.reparto]=0.7;});return R;})(),
    campi:d.campi.map(function(c){return {id:c.id,ruolo:c.ruolo,label:c.label,tipo:c.tipo==='num'?'num':(c.opz?'scelta':'testo'),opz:c.opz,std:c.std,min:c.min,max:c.max,cod:c.cod};}),
    
    cfgDefault:(function(){var o={};
      if(d._strati) o.strati=JSON.parse(JSON.stringify(d._strati));
      d.campi.forEach(function(c){
      var s=(c.std&&c.std.length)?c.std[0]:null;
      if(c.tipo==='num') o[c.id]= s!=null ? (parseFloat(String(s).replace(',','.'))||0) : 0;
      else if(c.opz&&c.opz.length) o[c.id]=c.opz[0];      /* nasce già sulla prima scelta (non vuoto) */
      else o[c.id]= s!=null ? String(s) : '';
    });return o;})(),
    regoleTesto:(d.regoleText||[]).slice(),          /* il testo originale: serve per riaprire e modificare */
    regole:d.regoleText.map(function(r){var v=parseVincolo(r,d.campi);
      if(v)return {se:v.se, tipo:(v.tipo||'avviso'), valore:v.valore, msg:v.msg, sev:v.sev, sistemi:['config']};
      return parseRegolaLib(r);}),
    regoleText:d.regoleText.slice(),
    componenti:(d.distinta||[]).map(function(v){return {cod:v.cod,nome:v.nome,um:v.um,qta:(v.qta!=null&&v.qta!=='')?String(v.qta):'1',prezzo:(v.prezzo!=null&&v.prezzo!=='')?String(v.prezzo):'0',se:(v.se!=null&&v.se!=='')?v.se:undefined};}),
    codice:{padre:(d.nome||'PRD').substring(0,3).toUpperCase(),pos:d.campi.slice(0,3).map(function(c){return c.id;})},
    descr:'"'+d.nome+'"',
    dash:d.campi.slice(0,4).map(function(c){return {label:c.label,f:c.id};}),
    disegno:(d.geom?function(cfg,s){return {geom:d.geom};}:(function(CP,NM){return function(cfg,s){return _disegnoDaCampi(cfg,CP,NM);};})(d.campi.slice(),d.nome)),
    qr:function(riga,C){return [ordine.numero,lib.voce.sigla+' x'+riga.qta].join('|');}
  };
  // base ereditata (dichiarata nella narrazione della libreria)
  if(officina.base && officina.base!=='__cad' && LIB[officina.base]) lib.baseDa=LIB[officina.base].voce.nuovo;
  lib.cicli=(officina.tempi?[]:[{reparto:'Lavorazione',fase:'Produzione',min:'10'}]);
  lib.reparti=Object.assign({},REPARTI_STD,lib.reparti||{});
  /* ── MODIFICA: sostituisco la libreria e porto le novità a chi la sta già usando ── */
  if(officina.mode==='modifica' && officina.target && LIB[officina.target]){
    var vecchia=LIB[officina.target];
    lib.voce=Object.assign({},vecchia.voce,{nuovo:d.nome});      /* la cornice del mondo resta la sua */
    lib.clienti=vecchia.clienti||lib.clienti;
    if(!lib.glbData) lib.glbData=vecchia.glbData||null;
    if(!lib.tempi)   lib.tempi=vecchia.tempi||null;
    LIB[officina.target]=lib;
    /* le righe che la usano: tengono le scelte fatte, e GUADAGNANO i campi nuovi */
    ordine.righe.forEach(function(rg){
      if(rg.lib!==officina.target)return;
      var base=JSON.parse(JSON.stringify(lib.cfgDefault));
      Object.keys(rg.cfg).forEach(function(k){ if(base[k]!==undefined && rg.cfg[k]!=null && rg.cfg[k]!=='') base[k]=rg.cfg[k]; });
      rg.cfg=base;
    });
    closeOfficina(); renderAll(); return;
  }
  if(officina.mondoTarget==='nuovo'){
    // NASCE UN MONDO COMPIUTO E SIGILLATO, col suo titolo
    var slug=(officina.titolo||d.nome||'mondo').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')+'_'+Date.now();
    var libId=slug+'_lib';
    LIB[libId]=lib;
    GRUPPI.push({id:slug,nome:officina.titolo||d.nome,primary:libId,libs:[libId],sealed:true});
    attivazione[slug]=true;                 // tu lo attivi (nel banco: attivo subito)
    mondoCorrente=slug; mondoAttivo=libId; nuovaCommessa();
    closeOfficina();
    ordine.righe.push({lib:libId,cfg:JSON.parse(JSON.stringify(lib.cfgDefault)),qta:1});rigaAttiva=0;
    boot();
  } else {
    // completa un prodotto dentro il mondo esistente
    LIB[id]=lib;
    var G=GRUPPI.find(function(x){return x.libs.indexOf(id)>=0;});
    if(!G){GRUPPI.find(function(x){return x.id===mondoCorrente;}).libs.push(id);}
    closeOfficina();
    ordine.righe.push({lib:id,cfg:JSON.parse(JSON.stringify(lib.cfgDefault)),qta:1});rigaAttiva=ordine.righe.length-1;
    boot();
  }
}

boot();
</script>
