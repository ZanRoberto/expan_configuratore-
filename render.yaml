services:
  - type: web
    name: expan-configuratore
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/expan.db
      - key: EXPORT_API_KEY
        generateValue: true
    disk:
      name: expan-data
      mountPath: /var/data
      sizeGB: 1
